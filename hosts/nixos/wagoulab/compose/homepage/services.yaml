---
- Services:
    - Vaultwarden:
        icon: vaultwarden.svg
        href: https://vault.wagou.fr
        description: Password manager
        siteMonitor: http://vaultwarden:80
    - OpenCloud:
        icon: owncloud.svg
        href: https://cloud.wagou.fr
        description: File sync & sharing
        siteMonitor: http://opencloud:9200
    - Immich:
        icon: immich.svg
        href: https://pixel.wagou.fr
        description: Photo management
        siteMonitor: http://immich-server:2283
        widget:
          type: immich
          url: http://immich-server:2283
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
          version: 2
- Media:
    - Home Assistant:
        icon: home-assistant.svg
        href: https://home.wagou.fr
        description: Home automation
        siteMonitor: http://home-assistant:8123
    - Jellyfin:
        icon: jellyfin.svg
        href: https://tape.wagou.fr
        description: Media server
        siteMonitor: http://jellyfin:8096
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          enableBlocks: true
          enableNowPlaying: false
- Infrastructure:
    - AdGuard Home:
        icon: adguard-home.svg
        href: https://guard.wagou.fr
        description: DNS & ad blocking
        siteMonitor: http://adguard:3000
        widget:
          type: adguard
          url: http://adguard:3000
          username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
    - Cloudflare Tunnel:
        icon: cloudflare.svg
        description: Secure remote access
        widget:
          type: cloudflared
          accountid: "65b2dca00576549f065820b1cd5c76c9"
          tunnelid: "77f1d05e-ce21-4a09-8229-13f173b38525"
          key: "{{HOMEPAGE_VAR_CF_API_TOKEN}}"
