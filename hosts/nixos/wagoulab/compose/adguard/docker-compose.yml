networks:
  proxy:
    external: true

services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "192.168.68.65:53:53/tcp"
      - "192.168.68.65:53:53/udp"
      - "127.0.0.1:53:53/tcp"
      - "127.0.0.1:53:53/udp"
      - "127.0.0.1:3000:3000/tcp"
    volumes:
      - /var/lib/adguardhome/work:/opt/adguardhome/work
      - /var/lib/adguardhome/conf:/opt/adguardhome/conf
    labels:
      - traefik.enable=true
      - traefik.http.routers.adguard.rule=Host(`guard.wagou.fr`)
      - traefik.http.routers.adguard.entrypoints=websecure
      - traefik.http.routers.adguard.tls=true
      - traefik.http.routers.adguard.middlewares=secure-headers@file
      - traefik.http.services.adguard.loadbalancer.server.port=3000
