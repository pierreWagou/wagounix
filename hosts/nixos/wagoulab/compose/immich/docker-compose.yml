networks:
  proxy:
    external: true
  immich-internal:

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    networks:
      - proxy
      - immich-internal
    volumes:
      - /var/lib/immich:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: immich-postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-redis
      REDIS_PORT: "6379"
      IMMICH_MACHINE_LEARNING_URL: http://immich-ml:3003
    depends_on:
      - immich-postgres
      - immich-redis
    labels:
      - traefik.enable=true
      - traefik.http.routers.immich.rule=Host(`pixel.wagou.fr`)
      - traefik.http.routers.immich.entrypoints=websecure
      - traefik.http.routers.immich.tls=true
      - traefik.http.routers.immich.middlewares=secure-headers@file
      - traefik.http.services.immich.loadbalancer.server.port=2283

  immich-ml:
    image: ghcr.io/immich-app/immich-machine-learning:release-openvino
    container_name: immich-ml
    restart: unless-stopped
    networks:
      - immich-internal
    volumes:
      - /var/lib/immich-ml-cache:/cache
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "303"

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    networks:
      - immich-internal
    volumes:
      - /var/lib/immich-postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: "--data-checksums"
    shm_size: 128m

  immich-redis:
    image: docker.io/valkey/valkey:9
    container_name: immich-redis
    restart: unless-stopped
    networks:
      - immich-internal
