version: 1
metadata:
  name: Wagou - Custom Brand
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Authentication flow
      required: false

  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Recovery flow
      required: false

  - model: authentik_brands.brand
    state: present
    identifiers:
      domain: authentik-default
    attrs:
      default: true
      branding_title: Wagou
      branding_logo: "@logoUrl@"
      branding_favicon: "@faviconUrl@"
      branding_default_flow_background: "@bgUrl@"
      branding_custom_css: "@customCss@"
      flow_authentication: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      flow_invalidation: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
      flow_user_settings: !Find [authentik_flows.flow, [slug, default-user-settings-flow]]
      flow_recovery: !Find [authentik_flows.flow, [slug, default-recovery-flow]]

  - model: authentik_flows.flow
    state: present
    identifiers:
      slug: default-authentication-flow
    attrs:
      title: Sign in to Wagoulab
