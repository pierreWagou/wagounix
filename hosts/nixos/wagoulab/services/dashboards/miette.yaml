views:
  - title: Miette
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Fountain Status
          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - integration: petkit
                  domain: binary_sensor
                  options:
                    type: tile
                - integration: petkit
                  domain: sensor
                  options:
                    type: tile

      - type: grid
        cards:
          - type: heading
            heading: Fountain Controls
          - type: custom:auto-entities
            card:
              type: grid
              columns: 3
              square: false
            card_param: cards
            filter:
              include:
                - integration: petkit
                  domain: switch
                  options:
                    type: tile

      - type: grid
        cards:
          - type: heading
            heading: Actions
          - type: custom:auto-entities
            card:
              type: grid
              columns: 3
              square: false
            card_param: cards
            filter:
              include:
                - integration: petkit
                  domain: button
                  options:
                    type: tile
