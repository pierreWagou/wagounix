            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: iPhone
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "sensor.wagous_iphone_battery_level_2"
            sort:
              method: friendly_name
