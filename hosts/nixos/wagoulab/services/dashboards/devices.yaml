views:
  - title: Devices
    type: sections
    sections:
      - cards:
          - type: heading
            heading: Living Room Sensor
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "sensor.thermalmap_living_room_battery"
                - entity_id: "update.thermalmap_living_room_firmware"
            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: Balcony Sensor
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "sensor.zigbheat_balcony_battery"
                - entity_id: "update.zigbheat_balcony_firmware"
            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: Bedroom Sensor
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "sensor.zigbheat_bedroom_battery"
                - entity_id: "update.zigbheat_bedroom_firmware"
            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: Office Sensor
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "sensor.zigbheat_office_battery"
                - entity_id: "update.zigbheat_office_firmware"
            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: Vacuum (L40 Ultra)
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "sensor.l40_ultra_battery_level"
