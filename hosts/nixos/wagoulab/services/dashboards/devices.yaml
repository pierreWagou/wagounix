views:
  - title: Devices
    type: sections
    sections:
      - cards:
          - type: heading
            heading: Living Room Sensor
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "/sensor\\.thermalmap_living_room_(battery|lqi|rssi)/"
                - entity_id: "update.thermalmap_living_room_firmware"
            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: Balcony Sensor
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "/sensor\\.zigbheat_balcony_(battery|lqi|rssi)/"
                - entity_id: "update.zigbheat_balcony_firmware"
            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: Bedroom Sensor
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "/sensor\\.zigbheat_bedroom_(battery|lqi|rssi)/"
                - entity_id: "update.zigbheat_bedroom_firmware"
            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: Office Sensor
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "/sensor\\.zigbheat_office_(battery|lqi|rssi)/"
                - entity_id: "update.zigbheat_office_firmware"
            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: Vacuum (L40 Ultra)
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "/sensor\\.l40_ultra_(status|battery_level|charging_status|relocation_status|task_status)/"
                - entity_id: "/sensor\\.l40_ultra_(clean_water_tank_status|dirty_water_tank_status|dust_bag_status|detergent_status)/"
                - entity_id: "update.dreame_vacuum_update"
            sort:
              method: friendly_name

      - cards:
          - type: heading
            heading: iPhone
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - entity_id: "/sensor\\.wagous_iphone_(battery_level|battery_state)/"
            sort:
              method: friendly_name
