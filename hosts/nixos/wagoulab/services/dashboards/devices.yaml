views:
  - title: Devices
    type: sections
    sections:
      - cards:
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Zigbheat Living Room
                secondary: "Battery: {{ states('sensor.thermalmap_living_room_battery') }}%\nFirmware: {{ 'Update available' if is_state('update.thermalmap_living_room_firmware', 'on') else 'Up to date' }}"
                multiline_secondary: true
                fill_container: true
                icon: mdi:zigbee
                icon_color: green
                tap_action:
                  action: navigate
                  navigation_path: /config/devices/device/1b07c3dcfc1fa26af2532202ca4657aa

              - type: custom:mushroom-template-card
                primary: Zigbheat Balcony
                secondary: "Battery: {{ states('sensor.zigbheat_balcony_battery') }}%\nFirmware: {{ 'Update available' if is_state('update.zigbheat_balcony_firmware', 'on') else 'Up to date' }}"
                multiline_secondary: true
                fill_container: true
                icon: mdi:zigbee
                icon_color: green
                tap_action:
                  action: navigate
                  navigation_path: /config/devices/device/9f03940cc6a8ec073a0945178531491a

              - type: custom:mushroom-template-card
