views:
  - title: Lights
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Bathroom
          - type: custom:auto-entities
            card:
              type: grid
              columns: 3
              square: false
            card_param: cards
            filter:
              include:
                - domain: light
                  area: Bathroom
                  options:
                    type: tile
                    features:
                      - type: light-brightness

