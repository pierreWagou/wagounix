name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: wagounix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: nixfmt
        run: nix develop --command bash -c 'find . -name "*.nix" -not -path "./.git/*" -not -path "./result/*" | xargs nixfmt --check'
      - name: statix
        run: nix develop --command statix check .
      - name: deadnix
        run: nix develop --command deadnix --fail .

  build-darwin:
    needs: lint
    runs-on: macos-15
    strategy:
      matrix:
        profile: [wagoumac, alan]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: wagounix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ${{ matrix.profile }}
        run: nix build .#darwinConfigurations.${{ matrix.profile }}.system --no-link

  build-nixos:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v15
        with:
          name: wagounix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build wagoulab
        run: nix build .#nixosConfigurations.wagoulab.config.system.build.toplevel --no-link
