name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: wagounix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Configure SAP GitHub access
        run: |
          git config --global url."https://${{ secrets.SAP_GITHUB_TOKEN }}@github.tools.sap/".insteadOf "https://github.tools.sap/"
      - name: nixfmt
        run: nix develop --command bash -c 'nixfmt --check $(find . -name "*.nix")'
      - name: statix
        run: nix develop --command statix check .
      - name: deadnix
        run: nix develop --command deadnix --fail .

  build-darwin:
    runs-on: macos-15
    strategy:
      matrix:
        profile: [sap, wagou, pro]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: wagounix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Configure SAP GitHub access
        run: |
          git config --global url."https://${{ secrets.SAP_GITHUB_TOKEN }}@github.tools.sap/".insteadOf "https://github.tools.sap/"
      - name: Build ${{ matrix.profile }}
        run: nix build .#darwinConfigurations.${{ matrix.profile }}.system --no-link

  build-nixos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: wagounix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Configure SAP GitHub access
        run: |
          git config --global url."https://${{ secrets.SAP_GITHUB_TOKEN }}@github.tools.sap/".insteadOf "https://github.tools.sap/"
      - name: Build homeserver
        run: nix build .#nixosConfigurations.homeserver.config.system.build.toplevel --no-link
